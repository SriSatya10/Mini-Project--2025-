        body { font-family: Arial, sans-serif; text-align: center; background: #ffe6f2; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.2); }
        select, button { padding: 10px; margin: 10px; font-size: 16px; border-radius: 5px; border: none; }
        .schedule-container { display: flex; justify-content: space-between; }
        .column { width: 45%; background: #ffcce0; padding: 10px; border-radius: 10px; }
        .time-slot { display: flex; justify-content: space-between; margin: 5px 0; align-items: center; }
        select { width: 70%; }
        h1, h2 { color: #d63384; }
    </style>
</head>

        <h1>24-Hour Schedule Tracker</h1>
        <label for="profession">Choose Your Profession:</label>

            <option value="">Select Profession</option>
            <option value="doctor">Doctor</option>
            <option value="engineer">Software Engineer</option>
            <option value="artist">Artist</option>
            <option value="entrepreneur">Entrepreneur</option>
            <option value="teacher">Teacher</option>
            <option value="lawyer">Lawyer</option>
            <option value="athlete">Athlete</option>
            <option value="scientist">Scientist</option>
            <option value="government">Government Employee</option>
            <option value="freelancer">Freelancer</option>
            <option value="student">Student</option>
        </select>

            <div class="column" id="schedule-am">
                <h2>AM Schedule</h2>
            </div>
            <div class="column" id="schedule-pm">

        </div>
    </div>

        function generateTimeSlots() {
            let profession = document.getElementById("profession").value;
            let amColumn = document.getElementById("schedule-am");
            let pmColumn = document.getElementById("schedule-pm");
            amColumn.innerHTML = "<h2>AM Schedule</h2>";
            pmColumn.innerHTML = "<h2>PM Schedule</h2>";
            
            if (!schedules[profession]) return;
            
            Object.keys(schedules[profession]).forEach(time => {
                let slotDiv = document.createElement("div");
                slotDiv.className = "time-slot";
                slotDiv.innerHTML = `<span>${time}</span> <strong>${schedules[profession][time]}</strong>`;
                if (parseInt(time) < 12) {
                    amColumn.appendChild(slotDiv);
                } else {
                    pmColumn.appendChild(slotDiv);
                }
            });
        }
