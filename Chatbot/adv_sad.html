<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced SAD Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // JavaScript for live range update and score calculation
        function updateRangeValue(rangeId, outputId) {
            const value = document.getElementById(rangeId).value;
            document.getElementById(outputId).innerText = value;
        }

        function calculateScore() {
            let score = 0;

            // Collect range-based scores
            document.querySelectorAll(".range-input").forEach((range) => {
                score += parseInt(range.value);
            });

            // Collect choice-based scores
            document.querySelectorAll(".choice-input").forEach((select) => {
                score += parseInt(select.value);
            });

            // Collect checkbox-based scores (multi-choice)
            document.querySelectorAll(".checkbox-input:checked").forEach((checkbox) => {
                score += parseInt(checkbox.value);
            });

            // Display the result
            document.getElementById("result").innerText = `Your Total Score: ${score}`;
            document.getElementById("result-section").style.display = "block";
            document.getElementById("message").innerText = "No worries, I'm here with you.";
        }
    </script>
    <style>
        /* General Styles */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

/* Container Styles */
.container {
    max-width: 800px;
    width: 90%;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    padding: 30px;
    text-align: center;
    transition: transform 0.3s ease-in-out;
}

.container:hover {
    transform: scale(1.02);
}

/* Header Styles */
header {
    margin-bottom: 30px;
}

header h1 {
    font-size: 2rem;
    color: #ff6b8b;
}

header p {
    font-size: 1rem;
    color: #ff84a3;
}

/* Form and Question Styles */
form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.question-section {
    text-align: left;
}

.question {
    margin-bottom: 15px;
    background: #fdf5f9;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    transition: background 0.3s ease-in-out;
}

.question:hover {
    background: #ffe4ec;
}

.question label {
    display: block;
    font-size: 1rem;
    color: #444444;
    margin-bottom: 10px;
}

.range-input {
    width: 100%;
}

.choice-input {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border: 1px solid #ddd;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}

/* Button Styles */
.submit-btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b8b, #ff9a9e);
    color: #ffffff;
    font-size: 1.2rem;
    padding: 12px 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s, box-shadow 0.3s;
}

.submit-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Advanced SAD Analysis</h1>
            <p>Please answer the questions below as accurately as possible.</p>
        </header>

        <form onsubmit="event.preventDefault(); calculateScore();">
            <div class="question-section">
                <!-- Rating-Based Questions -->
                <div class="question">
                    <label for="q1">1. In situations such as job interviews or presentations, do you find yourself preemptively imagining worst-case scenarios or overly focusing on potential negative outcomes, even when you have no reason to believe these fears will materialize? How does this affect your overall performance and mental state before, during, and after the event?</label>
                    <input type="range" id="q1" class="range-input" min="1" max="4" value="1" oninput="updateRangeValue('q1', 'range-output-q1')">
                    <span id="range-output-q1">1</span>
                </div>
        
                <div class="question">
                    <label for="q2">2. When experiencing social anxiety, do you often encounter physical sensations like sweating, blushing, or feeling nauseous? How do these symptoms influence your interactions with others, and what coping mechanisms have you adopted to manage them in real-time?</label>
                    <input type="range" id="q2" class="range-input" min="1" max="4" value="1" oninput="updateRangeValue('q2', 'range-output-q2')">
                    <span id="range-output-q2">1</span>
                </div>
        
                <div class="question">
                    <label for="q3">3. How strongly does the feeling of being rejected, even if it's subtle or imagined, impact your emotional state? Do you find yourself experiencing depressive thoughts, isolation, or frustration as a result of these perceptions, and how do these feelings linger over time?</label>
                    <input type="range" id="q3" class="range-input" min="1" max="4" value="1" oninput="updateRangeValue('q3', 'range-output-q3')">
                    <span id="range-output-q3">1</span>
                </div>
        
                <div class="question">
                    <label for="q4">4. Do you frequently avoid starting conversations or reaching out to others, fearing that you might say something wrong or not be accepted? How does this avoidance influence your social life, and what challenges have you faced in attempting to overcome these barriers?</label>
                    <input type="range" id="q4" class="range-input" min="1" max="4" value="1" oninput="updateRangeValue('q4', 'range-output-q4')">
                    <span id="range-output-q4">1</span>
                </div>
        
                <div class="question">
                    <label for="q5">5. Do you often compare yourself to others in social settings, feeling that you are inferior or less capable in comparison? How does this self-criticism affect your motivation to engage socially or pursue personal growth opportunities, and what effect does it have on your long-term emotional well-being?</label>
                    <input type="range" id="q5" class="range-input" min="1" max="4" value="1" oninput="updateRangeValue('q5', 'range-output-q5')">
                    <span id="range-output-q5">1</span>
                </div>
        
                <!-- Single Choice Questions -->
                <div class="question">
                    <label for="q6">6. Has your social anxiety led to difficulties in maintaining close relationships or friendships? Do you notice a pattern of distancing yourself from people, or have you noticed that anxiety prevents you from connecting at a deeper level with others? How do you cope with these relationship challenges, and what role does anxiety play in these patterns?</label>
                    <select id="q6" class="choice-input">
                        <option value="1">No, I have not noticed any difficulties.</option>
                        <option value="2">Yes, I experience some difficulty occasionally.</option>
                        <option value="3">Yes, I often struggle to maintain close relationships.</option>
                        <option value="4">Yes, I frequently distance myself and struggle to connect with others.</option>
                    </select>
                </div>

                <div class="question">
                    <label for="q7">7. How do you cope with social situations that trigger anxiety?</label>
                    <select id="q7" class="choice-input">
                        <option value="1">I avoid them altogether.</option>
                        <option value="2">I try to manage my anxiety by taking breaks or using relaxation techniques.</option>
                        <option value="3">I push myself to face the situation, but it feels very challenging.</option>
                        <option value="4">I embrace the challenge and try to improve my skills through exposure.</option>
                    </select>
                </div>

                <div class="question">
                    <label for="q8">8. How often do you feel overwhelmed by the thought of socializing?</label>
                    <select id="q8" class="choice-input">
                        <option value="1">Rarely</option>
                        <option value="2">Sometimes</option>
                        <option value="3">Often</option>
                        <option value="4">Almost always</option>
                    </select>
                </div>
        
                <div class="question">
                    <label for="q9">9. Do you experience intense anxiety in social interactions, not just from the fear of judgment, but also from the fear of being misunderstood or rejected in subtle ways (e.g., facial expressions, tone of voice)? How do you manage these feelings during social interactions?</label>
                    <select id="q9" class="choice-input">
                        <option value="1">I rarely feel this way and have no trouble managing it.</option>
                        <option value="2">I sometimes feel this way but manage to get through social interactions.</option>
                        <option value="3">I often feel this way, and it affects my ability to engage in social interactions.</option>
                        <option value="4">I feel this way most of the time, which makes social interactions extremely difficult.</option>
                    </select>
                </div>
        
                <div class="question">
                    <label for="q10">10. When thinking about past social situations, do you often engage in excessive self-monitoring or replaying events, questioning how others perceive you, even if there is no clear evidence of negative judgment? How much time do you spend on these thoughts after social interactions?</label>
                    <select id="q10" class="choice-input">
                        <option value="1">I rarely engage in this kind of self-monitoring.</option>
                        <option value="2">I occasionally replay past events but quickly move on.</option>
                        <option value="3">I often replay events and question how others perceived me.</option>
                        <option value="4">I constantly replay past interactions, often obsessing over my perceived mistakes.</option>
                    </select>
                </div>

                <!-- Multi-Choice Questions -->
                <div class="question">
                    <label for="q11">11. Beyond avoiding speaking in front of groups, do you find yourself avoiding certain places, events, or activities altogether (e.g., parties, group gatherings, or even work meetings), and what impact does this avoidance have on your relationships and professional life?</label>
                    <input type="checkbox" id="q11-1" class="checkbox-input" value="1">
                    <label for="q11-1">Avoiding group gatherings</label>
                    <br>
                    <input type="checkbox" id="q11-2" class="checkbox-input" value="1">
                    <label for="q11-2">Avoiding work meetings</label>
                    <br>
                    <input type="checkbox" id="q11-3" class="checkbox-input" value="1">
                    <label for="q11-3">Avoiding parties</label>
                    <br>
                    <input type="checkbox" id="q11-4" class="checkbox-input" value="1">
                    <label for="q11-4">Avoiding other social activities</label>
                </div>

                <div class="question">
                    <label for="q12">12. In social situations, do you experience physical symptoms such as rapid heartbeat, dizziness, or shaking? How do these symptoms influence your ability to engage in conversations or activities, and have you developed any coping strategies to manage them in real-time?</label>
                    <input type="checkbox" id="q12-1" class="checkbox-input" value="1">
                    <label for="q12-1">Rapid heartbeat</label>
                    <br>
                    <input type="checkbox" id="q12-2" class="checkbox-input" value="1">
                    <label for="q12-2">Dizziness</label>
                    <br>
                    <input type="checkbox" id="q12-3" class="checkbox-input" value="1">
                    <label for="q12-3">Shaking</label>
                    <br>
                    <input type="checkbox" id="q12-4" class="checkbox-input" value="1">
                    <label for="q12-4">Other symptoms</label>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>

        <div id="result-section" class="result-section">
            <h2 id="result">Your Total Score: 0</h2>
            <p id="message" class="message">No worries, I'm here with you.</p>
        </div>
    </div>
</body>
</html>
